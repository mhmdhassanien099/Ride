<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ride Logger</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2f7, #d9e4f5);
    margin: 0;
    padding: 15px;
}

.container {
    max-width: 420px;
    margin: auto;
}

h2 {
    text-align: center;
}

.card {
    background: white;
    padding: 18px;
    border-radius: 16px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    margin-bottom: 15px;
    text-align: center;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: bold;
}

.home { background: #28a745; color: white; }
.work { background: #007bff; color: white; }
.reset { background: #dc3545; color: white; }

.total {
    font-size: 22px;
    font-weight: bold;
    color: #28a745;
}

.small {
    color: gray;
    font-size: 13px;
}

input {
    width: 60%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
}

.ride {
    border-bottom: 1px solid #eee;
    padding: 10px 0;
}
</style>
</head>

<body>

<div class="container">

    <h2>🚗 Ride Logger</h2>

    <div class="card">
        <label>Edit Ride Price ($)</label>
        <input type="number" id="priceInput" placeholder="Enter price">

        <div class="total" id="priceDisplay">$0</div>

        <button class="home" onclick="saveRide('Home → Work')">🏠 Home → Work</button>
        <button class="work" onclick="saveRide('Work → Home')">🏢 Work → Home</button>
    </div>

    <div class="card">
        <div>Today's Total</div>
        <div class="total" id="todayTotal">$0</div>
        <hr>
        <div>All-Time Total</div>
        <div class="total" id="allTotal">$0</div>
        <button class="reset" onclick="resetData()">Reset All Data</button>
    </div>

    <div class="card">
        <h3>Saved Rides</h3>
        <div id="ridesList"></div>
    </div>

</div>

<script>
// 🔹 Load price or set default
let RIDE_PRICE = localStorage.getItem("ridePrice") || 5;
document.getElementById("priceDisplay").textContent = "$" + RIDE_PRICE;
document.getElementById("priceInput").value = RIDE_PRICE;

// 🔹 Update price
document.getElementById("priceInput").addEventListener("change", function() {
    RIDE_PRICE = parseFloat(this.value) || 0;
    localStorage.setItem("ridePrice", RIDE_PRICE);
    document.getElementById("priceDisplay").textContent = "$" + RIDE_PRICE;
});

// 🔹 Save ride
function saveRide(direction) {
    if (!RIDE_PRICE || RIDE_PRICE <= 0) {
        alert("Set a valid price first");
        return;
    }

    const now = new Date();
    const ride = {
        direction: direction,
        amount: RIDE_PRICE,
        date: now.toLocaleString(),
        dateKey: now.toISOString().split('T')[0] // YYYY-MM-DD
    };

    let rides = JSON.parse(localStorage.getItem("rides")) || [];
    rides.push(ride);
    localStorage.setItem("rides", JSON.stringify(rides));

    displayRides();
}

// 🔹 Display rides & totals
function displayRides() {
    const ridesList = document.getElementById("ridesList");
    let rides = JSON.parse(localStorage.getItem("rides")) || [];

    ridesList.innerHTML = "";

    let total = 0;
    let todayTotal = 0;
    const todayKey = new Date().toISOString().split('T')[0];

    rides.forEach(r => {
        const amt = parseFloat(r.amount) || 0;
        total += amt;
        if (r.dateKey === todayKey) {
            todayTotal += amt;
        }
    });

    rides.slice().reverse().forEach(r => {
        ridesList.innerHTML += `
            <div class="ride">
                <div><strong>${r.direction}</strong> — $${r.amount}</div>
                <div class="small">${r.date}</div>
            </div>
        `;
    });

    document.getElementById("allTotal").textContent = "$" + total.toFixed(2);
    document.getElementById("todayTotal").textContent = "$" + todayTotal.toFixed(2);
}

// 🔹 Reset all data
function resetData() {
    if (confirm("Are you sure you want to delete all rides?")) {
        localStorage.removeItem("rides");
        displayRides();
    }
}

displayRides();
</script>

</body>
</html>
